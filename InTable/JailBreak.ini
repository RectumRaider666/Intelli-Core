## <!-- [SS-1]: ByPassing the Updated OS & Gaining ADB Access ----->
## /1.1/ AOSP-Keyboard Access
[Prepare Table]
	1 = Hard Reset >> Hold Power + Volume Up + Volume Down until recovery menu appears, or Soft Reset >> Enter the Devices Settings and select the 'Advanced' section, then select Factory Reset.
	2 = Begin the Factory Reset and press accept/yes; then allow ample time for device to be fully reset.
	3 = It may or not automatically reboot depending on if you did a Hard or Soft Reset. Hard Reset will remain in the Recovery Menu where you can slect "Reboot Device Now", where a Soft reset will have most likely completed an Auto-Reboot, but if not after 10s of being shutdown after the reset, go ahead and power on the device.
	4 = When the device reboots and asks to connect to Wifi, press any network to begin typing the password and get the keyboard to appear. Then hold the 'Comma' or the 'Space-Bar' key until a pop-up appears right above the key you pressed, then release.
	5 = In a New pop-up there should be two menu items "Languages" and "(AOSP) Keyboard Settings"; Select the Keyboard Settings options and on the resulting options menu, select the "Appearance & Layouts" option; then select "Custom Input Styles".
	6 = Now in the very top right corner select the hard to see '+' icon, and get a new pop-up with two Options 'Langauge' & 'Layout'. For 'Language' options, cick it and scroll all the way to the very bottom and you should see a 'No Language (Alphabet)' option. Select this. Then for the 'Layout' option select PC. Then at the bottom of the pop-up click 'ADD'. (You dont have to use 'No Language' for the language option and can use your native language, however None seems to work best, and Layout MUST be PC always!!)
	7 = It will trigger an 'Enable Permission Menu', select 'Enable'. (If this does not trigger you may need to Hard Factory Reset by Holding the Volume Up & Down keys then holding the Power Button until it turns off then reboots in Recovery Mode)
	8 = Then in the next menu select "Use System Language" to turn it off, then select the newly created 'Alphabet (PC)' to turn on the standard PC Keyboard with a Settings Button on the Bottom-Left of the virtual keyboard. It can be helpful to then remove all other set languages by holding their label for 3s then clicking remove on the subsequent pop-up. (Now more than likely you wont have access to a 'Back' button to get back to the main menu settings, and if this is the case you will unfortunately have to hold the Power button and click 'Restart' when the Power GUI appears, then re-peat steps 1 - 5 to regain access to the settings menu.)
	9 = Now go back to the main settings menu and select "Languages", then ensure that 'Use System Language' is disabled, and then make sure to disable everything except "Alphabet (PC)" (Or whichever custom 'language' you added in steps 6-7).
	10 = Now hold the power button to turn off / restart the table. When the table restarts ensure that the keyboard that pops up has the 'Settings Cog' in the Bottom-Left Corner of the Keyboard. (If it is not, you must restart from the top with a Factory Reset and Try Again).
	11 = Now that our Settings Key is triggering correctly, as an optional Doubled-Down Precaution, you can clear the preset languages from the "Languages" option that pops-up after holding the 'Comma' or 'Space-Bar', and ensure that only our custom language is present. The when finished, select the menu back button in the top left and return to the Welcome! Screen.
	Next = If the Settings Cog is appearing in virtual keyboard, and your sure that only our custom language is set, your now ready for the next section.

## /1.2/ Access Android Settings & Enable ADB Access
[Enable Full-Settings]
	1 = After Restart double-ensure the Keyboard is successfully showing the settings cog. Then go ahead and prepare a secondary device such as a PC or Mobile Device and open a WiFi-Based HotSpot in the 2.4G Bandwidth. (You can use your home WiFi instead of a HotSpot. However you will need to unplug the router at a specific time to enter the exploit correctly, thus its typically easier to do with a hotspot. The HotSpots data-type should NOT be 5g as the un-updated Tables tend to struggle to find or maintain connections to 5G Networks)
	2 = Now actually connect the Table to the HotSpot and allow it to begin updating. But when the table begins to update, Immediatly! Turn Off the hotspot as soon as possible, allow the table to sit for ~30s, then fully powerdown the table and Let sit for 10 Seconds, then restart. (It should open up a Login Page. Tap any text entry field and when the Keyboard pops up, you should still have the settings cog in the bottom-left corner. If you do not, and you get the Updated 1.4 Keyboard, you must FULLY restart this guide from Section 1 step 1 with a factory reset!) (Sometimes this will work, and sometimes it wont. But if you actually let it update full and the very second the Login Page open, quickly tap a txt field to open the keyboard then, hit the settings cog, and hit Keyboard Settings before the keyboard updates from stock AOS to InfintyKeyboard, then leaving settings open will let you complete the rest of the steps)
	3 = Now tap any text field to open the keyboard and click your settings cog icon, then like before, Select "(AOSP) Keyboard Settings", then in settings select "Languages"; Now in the Top-Right Corner there should now be a Search Icon that wasnt there before. This lets you know the exploit is so far working! (If its not there you will most likely have to restart from the top and do a Factory Reset again, which I would recommend a Hard Reset. If you notice that any language besides our added custom language go ahead and remove them).
	4 = Select the search icon and type just the letter 'a' then hit search/enter. Scroll through the search results and find 'About Tablet' or sometimes labeled 'About Device' (Typically in the Middle of the Search Results) and select this. Then in the resulting menu go to the very bottom and you should see a label called 'Build Number'. Now quickly tap this repetatively until a Toast-Notification appears saying "You are now a Developer". (Not <int> steps away from becomming a developer. Or whatever.) Then go ahead and use the should now be appearing menu back button to go back to the previous search results / main settings menu.
	5 = Click The Back Button Just enough to land back in the Languages Menu with the Search-Icon in the top-right, then select search again. (This lets dev-opts appear)
	6 = Then click the search-bar again and type just the letter 'd'. Scroll through the results and find 'Developer Options' ( Rare but sometimes labeled 'Debugging' or even just 'Debug'), and select this. Ensure that in these settings, 'USB Debugging' is enabled. (As a helping-hand you can try and see if it lets you also enable 'Wireless Debugging' but most likely at this stage it will not and this is okay! USB Debugging is the Most Important Here)
	7 = Now go back to the search-bar again and type 'I'. Scroll through and find "Install From Unkown Sources", or similar labeled option, and select this. A list of 'App Sources' should then be presented. If any of the following appear in the list; ensure that they are enabled. 'Dashboard', 'Browser (or sometimes labeled Explorer)', 'Files'. (If any other system-app like Settings / System-Settings, Android-<BuildID>, com.<Package>, or other, go ahead and enable these too)
	8 = Now go back the search-bar again and type the word 'default'. Then scroll through and find 'Default USB Mode, or sometimes labeled 'Configuration' or 'Setting' instread of Mode, and select this option. Then in the next menu, ensure to set it to "Transfer Files", "Transfer Media", or whichever option suggests the USB Transffering of files/images/data.
	Next = If all the above went smoothly, at this point you are ready to move on to the next section, and you have the bare-minimum settings required for this exploit to work, however, there are some more optional settings that you can configure to potentially make the next step section of installing custom software, more willing to cooperate and work correctly. I suggest to atleast look them over, even if you dont enable any yet, so that you are aware of what options you have on the Tables-OS Device side of things.

## <!-- [SS-2]: Accessing the Table-OS Shell -----> 
## /2.1/ Connecting ADB via USB
[ADB - USB]
	1 = Now using a USB v3.0 (or higher) Thunderbolt(Data-Transfer Cable) USB-A Male to USB-A Male cable and connect the table with the Blue Colored USB Slot to your PC (with no other devices connected).
	2 = Ensure the latest adb-tools is installed and inlcuded in your PC's PATH (If your PC is Linux Based, in a terminal type 'sudo apt install adb' and for Windows, in a browser search for 'Android SDK-Tools & ADB Download' then install at minimum ADB, and for extra Android Related support install the full SDK-Tools'
	3 = Then open a terminal or command-prompt/powershell and type 'adb devices', then give the adb-daemon some time to activate. After the daemon begins a list of connected android devices with USB-Debugging enabled will be displayed (Itll be blank if nothing is found).
	4 = If a random Device-ID appears under the resulting list then this is your Inifnity Table's Device-ID, and you may continue-on and skip the [ADB Trouble-Shooting] section below, otherwise, go to that section now.

## /2.2/ Connecting ADB via WiFi
[ABD Remote]
	1 = Allow the Tablet to connect to the same WiFi Network as the PC, and then in the Tablets Settings, go to 'Developer Settings', The Hold 'Wireless Debugging' for 3s and release.
	2 = Ensure that Wireless Debugging is enabled, the click pair device with pairing code, and leave the pop-up open.
	3 = Note the Ip Address and Port from the pop-up then In the PC Terminal type 'adb pair <IP_ADDRES>:<PORT>', and then it will ask you to enter the 'Pairing Code'. Enter the same code on the Tablets Popup and you should get a succefully paired notification
	4 = After Successfully Pairing, the pop-up will go away and towards the top you will see an IP_Adress labal with the same IP_Adress from earlier but most likely a different port. Not that port and in the Terminal type 'adb connect <IP_ADDRESS>:<PORT>'
	5 = After this you should get a succesfully connected messaged. Test with 'adb devices' and make sure that <IP_ADDRESS>:<PORT> shows as a 'Connected Device'.

